# ============================================================
# Tuskrank — Local Development Stack
# ============================================================
# Mirrors the production Supabase + Postgres stack for local dev.
# This file ONLY defines infrastructure. Application services
# are added in subsequent sprints.

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tuskrank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tuskrank}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tuskrank-net

  redis:
    image: redis:7-alpine
    container_name: tuskrank-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tuskrank-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tuskrank-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_PORT: 4000
      APP_HOST: 0.0.0.0
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-tuskrank}
      DATABASE_SSL: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      LOG_FORMAT: ${LOG_FORMAT:-pretty}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_PROJECT_ID: ${SUPABASE_PROJECT_ID:-}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_TTL_MS: 60000
    ports:
      - "${API_PORT:-4000}:4000"
    networks:
      - tuskrank-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tuskrank-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tuskrank.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - tuskrank-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  tuskrank-net:
    driver: bridge
