services:
  # -----------------------------------------------
  # PostgreSQL (local development database)
  # -----------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: tuskrank-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tuskrank
      POSTGRES_PASSWORD: tuskrank_dev
      POSTGRES_DB: tuskrank_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tuskrank -d tuskrank_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------
  # NestJS API
  # -----------------------------------------------
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: tuskrank-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  # -----------------------------------------------
  # Next.js Web (for local full-stack testing)
  # -----------------------------------------------
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: tuskrank-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules

volumes:
  postgres_data: