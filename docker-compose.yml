# ============================================================
# Tuskrank — Local Development Stack
# ============================================================
# Mirrors the production Supabase + Postgres stack for local dev.
# This file ONLY defines infrastructure. Application services
# are added in subsequent sprints.

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tuskrank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tuskrank}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tuskrank-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tuskrank-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tuskrank.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - tuskrank-net

volumes:
  postgres_data:
    driver: local

networks:
  tuskrank-net:
    driver: bridge
