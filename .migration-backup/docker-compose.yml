services:
  postgres:
    image: postgres:16-alpine
    container_name: tuskrank-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tuskrank}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tuskrank-net

  redis:
    image: redis:7-alpine
    container_name: tuskrank-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tuskrank-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tuskrank-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_PORT: ${APP_PORT:-4000}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/tuskrank}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      LOG_FORMAT: ${LOG_FORMAT:-pretty}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_TTL_MS: ${REDIS_TTL_MS:-60000}
    ports:
      - "${API_PORT:-4000}:4000"
    networks:
      - tuskrank-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  tuskrank-net:
    driver: bridge